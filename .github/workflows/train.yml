name: Train Model CI

on:
  push:
    branches:
      - main

jobs:
  train:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn mlflow joblib

      - name: Verify Files
        run: |
          ls
          ls MLProject

      - name: Run Training
        run: |
          cd MLProject
          python modelling.py

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/model.pkl